<p-toast />
<div class="flex justify-content-center mt-6">
    <p-card class="w-11 md:w-4 lg:w-3">
        <ng-template #header>
            <div class="p-4 text-primary font-bold text-xl">
                {{ mode() === 'login' ? 'Connection' : 'Create an account' }}
            </div>
        </ng-template>
        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="field" [hidden]="mode() !== 'register'">
                <label for="name">Name</label>
                <input type="text" id="name" formControlName="name" pInputText class="p-inputtext p-component w-full" />
                <small class="invalid-feedback">The name is required</small>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="text" id="email" formControlName="email" pInputText
                    class="p-inputtext p-component w-full" />
                <small class="invalid-feedback">The email is required</small>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <p-password inputId="password" inputStyleClass="w-full" formControlName="password" class="w-full" />
                <small class="invalid-feedback">The password is required (min 4 characters)</small>
            </div>
            <div class="flex gap-2 justify-content-end">
                <p-button [loading]="submitting()" severity="secondary" (onClick)="toggleMode()"
                    [label]="mode() === 'login' ? 'Create an account' : 'Log in'" />
                <p-button [loading]="submitting()" type="submit"
                    [label]="mode() === 'login' ? 'Connexion' : 'Create the account'" />
            </div>
        </form>
    </p-card>
</div>
