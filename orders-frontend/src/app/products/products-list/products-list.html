<div class="card">
  @if (loading()) {
  <div class="flex justify-content-center p-5">
    <p-progressSpinner ariaLabel="loading"></p-progressSpinner>
  </div>
  } @else {
  <div class="card flex justify-center gap-2">
    <p-toast />
    <p-confirmdialog />
  </div>
  <div style="max-width: 90rem; margin: 0 auto; padding-top: 1rem">
    <p-toolbar class="mb-4">
      <ng-template #start>
        <p-button label="Créer" icon="pi pi-plus" class="mr-2" routerLink="/products/create" />
      </ng-template>
    </p-toolbar>
    <p-table #dt [value]="products()" [rows]="15" columns]="cols" [paginator]="true"
      [globalFilterFields]="['code', 'description']" [tableStyle]="{ 'min-width': '85rem' }"
      [(selection)]="selectedProducts" [rowHover]="true" dataKey="id"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [showCurrentPageReport]="true">
      <ng-template #caption>
        <div class="flex items-center justify-between w-full">
          <h5 class="text-primary font-bold text-2xl">Manage Products</h5>
          <div class="ml-auto">
            <p-iconfield>
              <p-inputicon class="pi pi-search" />
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Search..." />
            </p-iconfield>
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="code" style="min-width: 16rem">
            <div class="flex items-center gap-2">
              Code
              <p-sortIcon field="code" />
            </div>
          </th>
          <th pSortableColumn="description" style="min-width: 16rem">
            <div class="flex items-center gap-2">
              Description
              <p-sortIcon field="description" />
            </div>
          </th>
          <th pSortableColumn="price" style="min-width: 16rem">
            <div class="flex items-center gap-2">
              Prix
              <p-sortIcon field="price" />
            </div>
          </th>
          <th style="width: 12rem">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-product>
        <tr>
          <td style="min-width: 12rem">{{ product.code }}</td>
          <td style="min-width: 12rem">{{ product.description }}</td>
          <td style="min-width: 12rem">
            {{ product.price | currency }}
          </td>
          <td>
            <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true"
              [routerLink]="['/products', product.id, 'edit']" />
            <p-button [loading]="deleting()" icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
              (click)="deleteRecord(product, $event)" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
  }
</div>
