<p-toast />
@if (loading()) {
<div class="flex justify-content-center py-6">
  <p-progress-spinner />
</div>
} @else {

<div class="card flex justify-center gap-2">
  <p-toast />
  <p-confirmdialog />
</div>
<div class="flex justify-content-center pt-2">
  <p-card class="w-full md:w-8 lg:w-6" [style]="{ maxWidth: '40rem' }">
    <ng-template #header>
      <div class="p-4 text-primary font-bold text-xl">
        {{ productId() ? 'Mise à jour produit existant' : 'Nouveau produit' }}
      </div>
    </ng-template>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="code">Code</label>
        <input pInputText type="input" id="code" formControlName="code" class="w-full" />
        <small class="invalid-feedback">Le code est obligatoire (entre 3 et 10 caractères)</small>
      </div>
      <div class="field">
        <label for="description">Description</label>
        <input pInputText type="input" id="description" formControlName="description" class="w-full" />
        <small class="invalid-feedback">La description est oblidatoire (100 caractères maximum)</small>
      </div>
      <div class="p-fluid">
        <div class="field">
          <label for="price" class="block mb-2">Prix</label>
          <p-inputNumber pInputNumber formControlName="price" mode="currency" currency="EUR" locale="fr-FR" [min]="0"
            [minFractionDigits]="2" [maxFractionDigits]="2" id="price" />
          <small class="invalid-feedback">Le prix est obligatoire</small>
        </div>
      </div>
      <div class="flex justify-content-end gap-2">
        @if (productId()) {
        <p-button [loading]="deleting()" label="Supprimer" class="mr-auto" [outlined]="true"
          (onClick)="deleteProduct($event)" severity="danger" />
        }
        <p-button label="Annuler" routerLink="/products" severity="secondary" />
        <p-button type="submit" [loading]="submitting()" [label]="productId() ? 'Mettre à jour' : 'Créer'" />
      </div>
    </form>
  </p-card>
</div>
}
